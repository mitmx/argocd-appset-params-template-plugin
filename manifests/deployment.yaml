apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-appset-params-template-plugin
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-appset-params-template-plugin
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-appset-params-template-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-appset-params-template-plugin
        app.kubernetes.io/part-of: argocd
    spec:
      serviceAccountName: argocd-appset-params-template-plugin
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: plugin
          image: ghcr.io/mitmx/argocd-appset-params-template-plugin:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4355
          env:
            - name: TOKEN_FILE
              value: /var/run/argo/token
            - name: MAX_TEMPLATE_PASSES
              value: "4"
          volumeMounts:
            - name: token
              mountPath: /var/run/argo
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: token
          secret:
            secretName: argocd-appset-params-template-plugin-token
            items:
              - key: token
                path: token
